<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Maker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=Roboto:ital,wght@0,400;0,700;1,400;1,700&family=Merriweather:ital,wght@0,400;0,700;1,400;1,700&family=Open+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Pacifico&family=Oswald:wght@400;700&family=Lobster&family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="lib/jspdf.umd.min.js"></script>
  <script>
    if (!window.jspdf && !window.jsPDF) {
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js';
      document.head.appendChild(s);
    }
  </script>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="app-header" role="banner">
    <div class="header-left">
      <div class="logo">
        <i class="fa-solid fa-circle-dot" aria-hidden="true"></i> Button Maker
      </div>
      <span class="header-credit">Designed by Javier Morales</span>
    </div>

    <div class="header-actions">
      <button id="btn-load" class="btn btn-header" title="Load Saved Designs">
        <i class="fa-solid fa-upload" aria-hidden="true"></i> Load
      </button>
      <button id="btn-save" class="btn btn-header" title="Save Current Designs">
        <i class="fa-solid fa-download" aria-hidden="true"></i> Save
      </button>
      <input type="file" id="import-designs-file" accept=".buttons,.json" hidden>
      <button id="btn-reset" class="btn btn-header" title="Reset to Blank">
        <i class="fa-solid fa-rotate-right" aria-hidden="true"></i> Reset
      </button>
      <button id="btn-export" class="btn btn-header-primary" title="Generate PDF">
        <i class="fa-solid fa-file-pdf" aria-hidden="true"></i> Export PDF
      </button>
    </div>
  </nav>

  <main id="main-content">

    <aside id="left-sidebar" class="sidebar">
      
      <div class="sidebar-section" id="general-section" style="display: flex; justify-content: space-between; align-items: center;">
        <span class="button-size-label" id="button-size-label">1.5" Button</span>
        <div class="mode-toggle" id="mode-toggle">
          <button class="mode-btn active" data-mode="design" id="btn-design-mode">Design</button>
          <button class="mode-btn" data-mode="sheet" id="btn-sheet-mode">Sheet</button>
        </div>
      </div>

      <div class="sidebar-section" id="layout-section">
        <h2 class="sidebar-heading">View</h2>
        <div class="control-row">
          <label class="toggle-label">
            <input type="checkbox" id="toggle-guides" checked>
            <span>Show Guides</span>
          </label>
        </div>
      </div>

      <div class="sidebar-section" id="background-section">
        <h2 class="sidebar-heading">Background</h2>
        <div class="color-swatches" id="bg-color-swatches">
        </div>
        <div class="color-picker-row">
          <label for="bg-color-picker">Custom:</label>
          <input type="color" id="bg-color-picker" value="#FFFFFF" class="color-input">
        </div>
        <div class="control-row" style="margin-top:10px;">
          <label class="toggle-label">
            <input type="checkbox" id="toggle-gradient">
            <span>Gradient</span>
          </label>
        </div>
        <div id="gradient-controls" class="hidden">
          <div class="control-row" style="margin-top:6px;">
            <label>Presets:</label>
            <div class="gradient-presets" id="gradient-presets">
            </div>
          </div>
          <div class="color-picker-row" style="margin-top:8px;">
            <label for="bg-gradient-color2">To:</label>
            <input type="color" id="bg-gradient-color2" value="#4A90D9" class="color-input">
          </div>
          <div class="control-row" style="margin-top:6px;">
            <label for="gradient-direction">Direction:</label>
            <select id="gradient-direction" class="input">
              <option value="top-bottom">Top to Bottom</option>
              <option value="bottom-top">Bottom to Top</option>
              <option value="left-right">Left to Right</option>
              <option value="right-left">Right to Left</option>
              <option value="radial">Radial (center out)</option>
            </select>
          </div>
        </div>
      </div>

      <div class="sidebar-section" id="brand-text-section">
        <h2 class="sidebar-heading">Brand Text</h2>
        <div class="control-row">
          <input type="text" id="library-info-input" class="input" placeholder="e.g. San Rafael Public Library">
        </div>
        <div class="control-row">
          <label for="library-info-color">Color:</label>
          <input type="color" id="library-info-color" value="#666666" class="color-input">
        </div>
      </div>

      <div class="sidebar-section" id="image-section">
        <h2 class="sidebar-heading">Image</h2>
        <label class="btn btn-small btn-full upload-label" for="image-upload">
          Upload Image
          <input type="file" id="image-upload" accept="image/png,image/jpeg,image/svg+xml" hidden>
        </label>
        <div id="image-controls" class="image-controls hidden">
          <div class="control-row">
            <label for="image-scale">Scale:</label>
            <input type="range" id="image-scale" min="100" max="300" value="100">
            <span id="image-scale-display">100%</span>
          </div>
          <p style="font-size:11px;color:#888;margin-bottom:8px;">Drag image on canvas to reposition</p>
          <button class="btn btn-small btn-danger" id="btn-delete-image">Remove Image</button>
        </div>
      </div>
    </aside>

    <section id="canvas-area">
      <div id="design-canvas-wrapper" class="canvas-wrapper">
        <canvas id="design-canvas"></canvas>
      </div>
      <div id="sheet-view" class="sheet-view hidden">
      </div>
    </section>

  </main>

  <div id="export-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h2>Export PDF</h2>
      <div class="modal-body">
        <p style="font-size: 0.95rem; color: var(--text-light); margin-bottom: 0;">
          This will generate a ready-to-print US Letter sized PDF with 20 buttons. A thin black cut line will be automatically added around each button.
        </p>
      </div>
      <div class="modal-footer">
        <button class="btn" id="btn-export-cancel">Cancel</button>
        <button class="btn btn-primary" id="btn-export-confirm">Generate PDF</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/text-tool.js"></script>
  <script src="js/image-tool.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/pdf-export.js"></script>
  <script src="js/sheet-mode.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
